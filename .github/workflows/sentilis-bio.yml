name: Publish bio to Sentilis

on:
  push:
    branches:
      - master
    paths:
      - README.md
      - .github/workflows/sentilis-bio.yml
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Sentilis CLI
        run: npm i -g @sentilis/cli

      - name: Authenticate with Sentilis
        run: sentilis auth login ${{ secrets.SENTILIS_TOKEN }}

      - name: Push bio
        run: sentilis bio push README.md
